<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Login | Gridiron Give</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#4169E1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="/index.html" aria-label="Gridiron Give home">
        <span class="logo-mark">
          <img class="logo-image" src="/assets/gridirongiveblue.png" alt="Gridiron Give logo" onerror="this.remove()" />
          GG
        </span>
        <span class="logo-text">Gridiron Give</span>
      </a>
      <nav class="header-actions">
        <a class="btn btn-ghost" href="/index.html">Back to Site</a>
      </nav>
    </header>

    <main class="dashboard-main">
      <section class="card" style="max-width:560px;margin:20px auto;">
        <h1 class="dashboard-title">Employee Login</h1>
        <p class="subtle-copy">
          Sign in
        </p>
        <form id="admin-login-form" class="stack-form section-top-gap">
          <label>
            Username
            <input type="text" name="username" required />
          </label>
          <label>
            Password
            <input type="password" name="password" required />
          </label>
          <button class="btn btn-primary" type="submit">Sign In</button>
        </form>
        <p id="admin-login-feedback" class="form-feedback"></p>
      </section>
    </main>

    <script src="./action-modal.js"></script>
    <script src="./password-toggle.js"></script>
    <script>
      const form = document.getElementById("admin-login-form");
      const feedback = document.getElementById("admin-login-feedback");

      function setFeedback(message, isError = false) {
        feedback.textContent = message;
        feedback.classList.toggle("is-error", Boolean(isError));
      }

      function showAction(message, isError = false) {
        if (typeof window.showActionMessage === "function") {
          window.showActionMessage(message, { isError });
        }
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options
        });
        const json = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(json.error || "Request failed.");
        return json;
      }

      (async () => {
        try {
          const session = await api("/api/admin/auth/session");
          if (session.authenticated) window.location.href = "/admin-db";
        } catch {}
      })();

      form?.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        try {
          await api("/api/admin/auth/login", {
            method: "POST",
            body: JSON.stringify({
              username: String(formData.get("username") || "").trim(),
              password: String(formData.get("password") || "")
            })
          });
          window.location.href = "/admin-db";
        } catch (error) {
          setFeedback(error.message || "Could not sign in.", true);
          showAction(error.message || "Could not sign in.", true);
        }
      });
    </script>
  </body>
</html>
