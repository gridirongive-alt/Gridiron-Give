<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Profile | Gridiron Give</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#4169E1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="/index.html" aria-label="Gridiron Give home">
        <span class="logo-mark">
          <img
            class="logo-image"
            src="/assets/gridirongiveblue.png"
            alt="Gridiron Give logo"
            onerror="this.remove()"
          />
          GG
        </span>
        <span class="logo-text">Gridiron Give</span>
      </a>
      <nav class="header-actions">
        <a class="btn btn-ghost" href="/index.html">Back to Search</a>
      </nav>
    </header>

    <main class="dashboard-main">
      <section class="card donor-hero" id="team-top"></section>

      <section class="card section-top-gap">
        <h2 class="section-title">Roster</h2>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Position</th>
                <th>$ Raised</th>
                <th>$ Goal</th>
                <th>Progress</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="team-roster-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./action-modal.js"></script>
    <script src="./header-session.js"></script>
    <script src="./team-profile.js"></script>
  </body>
</html>
