<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Gridiron Give</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#4169E1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="/index.html" aria-label="Gridiron Give home">
        <span class="logo-mark">
          <img class="logo-image" src="/assets/gridirongiveblue.png" alt="Gridiron Give logo" onerror="this.remove()" />
          GG
        </span>
        <span class="logo-text">Gridiron Give</span>
      </a>
      <nav class="header-actions">
        <a class="btn btn-ghost" href="/index.html">Back</a>
      </nav>
    </header>

    <main class="dashboard-main">
      <section class="card" style="max-width:640px;margin:20px auto;">
        <h1 class="dashboard-title">Reset Password</h1>
        <p class="subtle-copy">Enter your email and recovery key to reset your password.</p>

        <form id="verify-form" class="stack-form section-top-gap">
          <label>
            Account Type
            <select name="role">
              <option value="player">Player</option>
              <option value="coach">Coach</option>
            </select>
          </label>
          <label>
            Email
            <input type="email" name="email" required />
          </label>
          <label>
            Recovery Key
            <input type="text" name="recoveryKey" required />
          </label>
          <button class="btn btn-primary" type="submit">Verify Recovery Key</button>
        </form>

        <form id="reset-form" class="stack-form section-top-gap" hidden>
          <label>
            New Password
            <input type="password" name="newPassword" required />
          </label>
          <label>
            Confirm New Password
            <input type="password" name="confirmPassword" required />
          </label>
          <button class="btn btn-money" type="submit">Save New Password</button>
        </form>

        <p id="reset-feedback" class="form-feedback"></p>
      </section>
    </main>

    <script src="./action-modal.js"></script>
    <script src="./password-toggle.js"></script>
    <script src="./reset-password.js"></script>
  </body>
</html>
